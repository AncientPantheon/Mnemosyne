# nginx server block for codex.ancientholdings.eu — Next.js app (reverse proxy).
#
# REPLACES the old static config (root /var/www/.../public + try_files). Keep your
# existing Let's Encrypt cert paths (certbot manages them) — only the location/
# root part changes from static-file serving to a reverse proxy to the pm2 app.
#
# Edit /etc/nginx/sites-available/codex.ancientholdings.eu, then:
#   nginx -t && systemctl reload nginx

# HTTP -> HTTPS redirect (certbot usually already added this).
server {
    listen 80;
    listen [::]:80;
    server_name codex.ancientholdings.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name codex.ancientholdings.eu;

    # --- KEEP your existing Let's Encrypt lines (do not change paths) ---
    ssl_certificate     /etc/letsencrypt/live/codex.ancientholdings.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codex.ancientholdings.eu/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # --------------------------------------------------------------------

    # Was: `root /var/www/codex.ancientholdings.eu/public; ... try_files ...;`
    # Now: proxy everything to the Next.js standalone app (pm2, 127.0.0.1:3005).
    # The Next app serves the landing, /codex, /admin, /api/*, and /_next/* assets
    # itself, so there is no separate static root anymore.
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # so the app knows it's https
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Optional: let Next's immutable build assets cache hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    client_max_body_size 12m;   # codex JSON uploads go through the browser, but be generous
}
